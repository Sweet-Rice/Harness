<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>T.ai Workspace</title>
  <link rel="stylesheet" href="/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="/app.js" defer></script>
</head>
<body>
  <button id="panel-backdrop" class="panel-backdrop" aria-label="Close open panels"></button>
  <div class="shell">
    <aside id="sidebar" class="sidebar panel">
      <div class="sidebar-header">
        <div class="header-row">
          <span class="eyebrow">forest workspace</span>
          <button id="sidebar-close" class="drawer-close" title="Close conversations">×</button>
        </div>
        <h1 class="brand">T.ai Grove</h1>
        <div class="sidebar-actions">
          <button id="new-chat" class="btn">New Chat</button>
          <button id="refresh-list" class="btn secondary">Refresh</button>
        </div>
      </div>
      <div id="convo-list" class="conversations"></div>
    </aside>

    <main class="workspace panel">
      <header class="workspace-header">
        <div class="workspace-heading">
          <div class="mobile-sidebar-action">
            <button id="sidebar-toggle" class="icon-btn" title="Toggle conversations">≡</button>
          </div>
          <div>
            <span class="eyebrow">nature-mode interface</span>
            <h2 class="workspace-title">Rooted Conversation</h2>
          </div>
        </div>
        <div class="status-cluster">
          <span id="status-chip" class="chip"><strong>Socket</strong> disconnected</span>
          <span id="cooking-chip" class="chip live"><strong>State</strong> idle</span>
          <div class="mobile-inspector-action">
            <button id="inspector-toggle" class="icon-btn" title="Toggle thinking trace" aria-label="Toggle thinking trace">
              <span class="icon-glyph" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false">
                  <path d="M12 3.25a6.75 6.75 0 0 0-4.2 12.03c.58.46.95 1.1 1.06 1.82h6.28c.1-.73.48-1.36 1.06-1.82A6.75 6.75 0 0 0 12 3.25Z"></path>
                  <path d="M9.4 18.75h5.2a2.6 2.6 0 0 1-5.2 0Z"></path>
                </svg>
              </span>
            </button>
          </div>
        </div>
      </header>

      <section class="chat-wrap">
        <div id="messages" class="chat-feed"></div>
      </section>

      <section class="composer">
        <div class="composer-shell">
          <div class="composer-input-wrap">
            <div id="slash-palette" class="palette">
              <div class="palette-header">Slash commands and skills</div>
              <div id="palette-list" class="palette-list"></div>
            </div>
            <textarea id="input" placeholder="Ask T.ai to plan, inspect, summarize, or delegate..."></textarea>
            <div class="composer-hint">Type <span class="mono">/</span> for skills and commands. Shift + Enter for a newline.</div>
          </div>
          <button id="send" class="btn">Send</button>
        </div>
      </section>
    </main>

    <aside id="inspector" class="inspector panel">
      <div class="inspector-header">
        <div class="header-row">
          <span class="eyebrow">live inspector</span>
          <button id="inspector-close" class="drawer-close" title="Close inspector">×</button>
        </div>
        <h2 class="inspector-title">Canopy Trace</h2>
      </div>

      <div class="tab-row">
        <button class="tab-btn active" data-tab="thinking">Thinking</button>
        <button class="tab-btn" data-tab="delegates">Delegates</button>
        <button class="tab-btn" data-tab="plan">Plan</button>
        <button class="tab-btn" data-tab="logs">Logs</button>
      </div>

      <div class="tab-panels">
        <section id="panel-thinking" class="tab-panel active"></section>
        <section id="panel-delegates" class="tab-panel"></section>
        <section id="panel-plan" class="tab-panel"></section>
        <section id="panel-logs" class="tab-panel"></section>
      </div>

      <div class="inspector-footer">Live trace is visible only for this current browser session.</div>
    </aside>
  </div>
</body>
</html>
